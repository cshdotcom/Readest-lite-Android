<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>阅读</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #f5f7fa; }
      .splash {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh; gap: 18px;
        font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
        color: #3c465a;
      }
      .book {
        width: 64px; height: 64px;
        border: 3px solid #3c465a; border-radius: 6px;
        position: relative;
        animation: pulse 1.4s ease-in-out infinite;
      }
      .book::before {
        content: ""; position: absolute;
        left: 50%; top: -3px; bottom: -3px; width: 3px;
        background: #283040;
      }
      .label { font-size: 14px; letter-spacing: 0.1em; opacity: 0.7; }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1.0); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="book"></div>
      <div class="label">加载中…</div>
    </div>
  </body>
</html>
